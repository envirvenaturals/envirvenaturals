<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envirve Admin | Manage Collection</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin specific layout to keep it clean */
        body {
        
            background-color: var(--soft-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-box {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--primary-green);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-green);
        }

        .upload-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .upload-btn:hover {
            background: var(--accent-green);
        }

        .product-preview-section {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #fdfdfd;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #f0f0f0;
        }

        .delete-btn {
            background: #ff4747;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: var(--primary-green);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<script>
    (function() {
        const password = prompt("Enter Admin Password to Access:");
        
        // Apna password "admin123" ki jagah yahan set karein
        if (password !== "envirvenaturals1313") { 
            alert("Access Denied! Redirecting to Home...");
            window.location.href = "index.html"; 
        }
    })();
</script>
    <div class="admin-box">
        <h2>Upload Product</h2>
        
        <form id="admin-form">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="name" placeholder="e.g. Lavender Silk Soap" required>
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="text" id="price" placeholder="e.g. $12.00" required>
            </div>

            <div class="form-group">
                <label>Image Path</label>
                <input type="text" id="image" placeholder="e.g. images/soap1.jpg" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="desc" rows="3" placeholder="Handmade with organic oils..." required></textarea>
            </div>

            <button type="submit" class="upload-btn">Add to Shop</button>
        </form>

        <div class="product-preview-section">
            <label>Currently Live:</label>
            <div id="admin-list"></div>
        </div>

        <a href="index.html" class="back-link">← Go to Main Site</a>
    </div>

  <script>
    const adminForm = document.getElementById('admin-form');
    const adminList = document.getElementById('admin-list');

    let productData = JSON.parse(localStorage.getItem('envirve_products')) || [];

    function updateAdminDisplay() {
        adminList.innerHTML = '';
        productData.forEach((item, index) => {
            adminList.innerHTML += `
                <div class="item-row" style="display:flex; justify-content:space-between; align-items:center; background:#f4f4f4; padding:10px; margin-bottom:5px; border-radius:8px;">
                    <span><strong>${item.name}</strong></span>
                    <button onclick="deleteProduct(${index})" style="background:#ff4747; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Delete</button>
                </div>
            `;
        });
    }

    adminForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const newItem = {
            name: document.getElementById('name').value,
            price: document.getElementById('price').value,
            img: document.getElementById('image').value,
            desc: document.getElementById('desc').value
        };
        productData.push(newItem);
        localStorage.setItem('envirve_products', JSON.stringify(productData));
        adminForm.reset();
        updateAdminDisplay();
        alert("Product added!");
    });

    // --- YAHAN THI AAPKI CONFUSION ---
    window.deleteProduct = function(index) {
        if(confirm("DO WANT TO DELETE?")) {
            productData.splice(index, 1);
            localStorage.setItem('envirve_products', JSON.stringify(productData));
            updateAdminDisplay();
            alert("Product removed from shop!");
        } // Bracket 1
    }; // Bracket 2

    // Initial load
    updateAdminDisplay();
</script>
