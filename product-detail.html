<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - Envirve Naturals</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body.detail-page-body {
            background: url('images/site-texture.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center; /* Card ko horizontally center karega */
            align-items: center;     /* Card ko vertically center karega */
            padding: 20px;
            overflow-x: hidden;
        }

        .glass-order-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            display: flex;
            flex-wrap: wrap; /* Mobile par automatic adjust hoga */
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            gap: 30px;
        }

        .image-stage {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dropping-product {
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .product-info-side {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .green-title { color: #2d5a27; font-size: 2.2rem; margin-bottom: 15px; }
        .product-description { color: #555; line-height: 1.6; margin-bottom: 20px; }
        .product-price-tag { font-size: 1.8rem; color: #333; margin-bottom: 25px; }

        .order-controls { display: flex; flex-direction: column; gap: 20px; }

        .qty-selector { display: flex; align-items: center; gap: 15px; }
        .qty-selector button { 
            width: 35px; height: 35px; border-radius: 50%; border: none;
            background: #2d5a27; color: white; cursor: pointer; font-weight: bold;
        }
        .qty-selector input { width: 50px; text-align: center; border: 1px solid #ddd; border-radius: 5px; padding: 5px; }

        .button-stack { display: flex; gap: 15px; flex-wrap: wrap; }
        .add-to-cart-btn, .buy-now-btn {
            padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .add-to-cart-btn { background: black; color: white; }
        .buy-now-btn { background: #2d5a27; color: white; }
        .add-to-cart-btn:hover, .buy-now-btn:hover { opacity: 0.8; transform: translateY(-3px); }

        .back-link { margin-top: 25px; color: #666; text-decoration: none; display: inline-block; }
    </style>
</head>
<body class="detail-page-body">

    <div class="glass-order-card">
        <div class="image-stage">
            <img id="detail-img" src="" alt="Product" class="dropping-product">
        </div>

        <div class="product-info-side">
            <h1 id="detail-name" class="green-title">Loading...</h1>
            <p id="detail-desc" class="product-description"></p>
            <h2 id="detail-price" class="product-price-tag"></h2>

            <div class="order-controls">
                <div class="qty-selector">
                    <button onclick="changeQty(-1)">-</button>
                    <input type="number" id="qty-input" value="1" min="1" readonly>
                    <button onclick="changeQty(1)">+</button>
                </div>
                
                <div class="button-stack">
                    <button class="add-to-cart-btn" onclick="addToCart()">Add to Cart</button>
                    <button class="buy-now-btn" onclick="proceedToBuy()">Proceed to Buy</button>
                </div>
            </div>
            
            <a href="index.html" class="back-link">← Return to Shop</a>
        </div>
    </div>

    <script>
        // Data fetch from URL
        const params = new URLSearchParams(window.location.search);
        const pName = params.get('name') || "Envirve Product";
        const pPrice = params.get('price') || "0";
        const pImg = params.get('img') || "";
        const pDesc = params.get('desc') || "Nature's best handcrafted for you.";

        // Update UI
        document.getElementById('detail-img').src = pImg;
        document.getElementById('detail-name').innerText = pName;
        document.getElementById('detail-desc').innerText = pDesc;
        document.getElementById('detail-price').innerText = "Rs " + pPrice;

        function changeQty(amt) {
            let input = document.getElementById('qty-input');
            let val = parseInt(input.value) + amt;
            if(val > 0) input.value = val;
        }

        function addToCart() {
            let qty = parseInt(document.getElementById('qty-input').value);
            let cart = JSON.parse(localStorage.getItem('envirveCart')) || [];
            
            let existingItem = cart.find(item => item.name === pName);

            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                cart.push({
                    name: pName,
                    price: pPrice,
                    img: pImg,
                    quantity: qty
                });
            }

            localStorage.setItem('envirveCart', JSON.stringify(cart));
            
            // Redirect with trigger to open drawer
            window.location.href = "index.html?openCart=true";
        }

       // ISKO REPLACE KAREIN (Previous code ke mutabiq)
function proceedToBuy() {
    let qty = parseInt(document.getElementById('qty-input').value);
    
    // URL se data nikalna (pName, pPrice, pImg pehle se defined hain aapke code mein)
    let cart = JSON.parse(localStorage.getItem('envirveCart')) || [];
    
    let existingItem = cart.find(item => item.name === pName);

    if (existingItem) {
        existingItem.quantity += qty;
    } else {
        cart.push({
            name: pName,
            price: pPrice,
            img: pImg,
            quantity: qty
        });
    }

    // Memory mein save karein
    localStorage.setItem('envirveCart', JSON.stringify(cart));
    
    // Total count update karein navbar ke liye
    const totalQty = cart.reduce((total, item) => total + item.quantity, 0);
    localStorage.setItem('cartCount', totalQty);

    // AUTOMATIC REDIRECT: Home page par jao aur cart kholo
    window.location.href = "index.html?openCart=true";
}
    </script>
</body>
</html>
